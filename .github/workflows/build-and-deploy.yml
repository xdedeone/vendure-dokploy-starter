on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    name: Build + Push Vendure Docker Image + Trigger Dokploy Deployment
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      # Checkout source code
      - name: Checkout source code
        uses: actions/checkout@v4

      # Extract metadata
      - name: Extract metadata
        id: meta
        run: |
          echo "REPO_NAME=${GITHUB_REPOSITORY##*/}" >> "$GITHUB_OUTPUT"
          echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
          echo "SHORT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      # Log in to GitHub Container Registry
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build and push prod image
      - name: Build and push production image
        uses: docker/build-push-action@v6
        with:
          context: ./vendure
          file: ./vendure/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ steps.meta.outputs.IMAGE_NAME }}:latest
            ${{ steps.meta.outputs.IMAGE_NAME }}:${{ steps.meta.outputs.SHORT_SHA }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Trigger Dokploy deployment webhook
      - name: Trigger Dokploy deployment for Vendure API
        run: |
          curl -f -X POST "${{ secrets.DEPLOY_WEBHOOK_VENDURE_API }}"

      # Prevents CPU spikes with concurrent startup of both worker and main instances
      - name: Wait 5 seconds
        run: sleep 5

      # Trigger Dokploy deployment webhook
      - name: Trigger Dokploy deployment for Vendure Worker
        run: |
          curl -f -X POST "${{ secrets.DEPLOY_WEBHOOK_VENDURE_WORKER }}"